AWSTemplateFormatVersion: '2010-09-09'
Description: "This Stack create RDS Db2 Dashboard which provide detailed insights about workloads running on RDS Db2 database."
Parameters:
  customName:
    Type: String
    Description: "Custom name for easy recognition"
  db2Instance: 
    Type: String
    Description: DB2 EC2 Instance Id or RDS DB Instance Identifier
  database:
    Type: String
    Description: DB2 Database Name
  cloudWatchNamespace:
    Type: String
    Description: Specify CloudWatch Namespace required for DB2Mon metrics. New Namespace will be created if it doesn't exist.
    Default: "DB2MonNS"
  cloudWatchLogGroupName:
    Type: String
    Description: Specify CloudWatch LogGroupName required for DB2Mon metrics. New LogGroup will be created if it doesn't exist.
    Default: "DB2MonLG"

Resources:
  DB2MonDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Join ['-', ["RDS-Db2", !Ref customName]]
      DashboardBody: !Sub |
        {
            "widgets": [
                {
                    "type": "text",
                    "x": 0,
                    "y": 113,
                    "width": 24,
                    "height": 1,
                    "properties": {
                        "markdown": "# Db2 Memory Pool\n",
                        "background": "transparent"
                    }
                },
                {
                    "type": "text",
                    "x": 0,
                    "y": 106,
                    "width": 24,
                    "height": 1,
                    "properties": {
                        "markdown": "# Database Utility Time Breakdown",
                        "background": "transparent"
                    }
                },
                {
                    "type": "text",
                    "x": 0,
                    "y": 6,
                    "width": 24,
                    "height": 1,
                    "properties": {
                        "markdown": "# Database Memory",
                        "background": "transparent"
                    }
                },
                {
                    "type": "text",
                    "x": 0,
                    "y": 149,
                    "width": 24,
                    "height": 1,
                    "properties": {
                        "markdown": "# Db2 Tablespace Metrics",
                        "background": "transparent"
                    }
                },
                {
                    "type": "text",
                    "x": 0,
                    "y": 142,
                    "width": 24,
                    "height": 1,
                    "properties": {
                        "markdown": "# Database Level IO Read & Write Times",
                        "background": "transparent"
                    }
                },
                {
                    "type": "metric",
                    "x": 0,
                    "y": 107,
                    "width": 24,
                    "height": 6,
                    "properties": {
                        "metrics": [
                            [ { "expression": "m1*m7/PERIOD(m1)", "label": "Backup%", "id": "e1", "visible": false } ],
                            [ { "expression": "m2*m7/PERIOD(m2)", "label": "Index Build%", "id": "e2", "visible": false } ],
                            [ { "expression": "m3*m7/PERIOD(m3)", "label": "Load%", "id": "e3", "visible": false } ],
                            [ { "expression": "m4*m7/PERIOD(m4)", "label": "Rollback%", "id": "e4", "visible": false } ],
                            [ { "expression": "m5*m7/PERIOD(m5)", "label": "Reorg%", "id": "e5", "visible": false } ],
                            [ { "expression": "m6*m7/PERIOD(m6)", "label": "Runstats%", "id": "e6", "visible": false } ],
                            [ "${cloudWatchNamespace}", "PCT_BACKUP", "TableName", "DB_TIMEB", "InstanceID", "${db2Instance}", "Database", "${database}", "MEMBER", "member_0", { "region": "${AWS::Region}", "label": "Backup%", "yAxis": "left", "id": "m1" } ],
                            [ ".", "PCT_IDX_BLD", ".", ".", ".", ".", ".", ".", ".", ".", { "region": "${AWS::Region}", "label": "Index Build%", "yAxis": "left", "id": "m2" } ],
                            [ ".", "PCT_LOAD", ".", ".", ".", ".", ".", ".", ".", ".", { "region": "${AWS::Region}", "label": "Load%", "yAxis": "left", "id": "m3" } ],
                            [ ".", "PCT_RBACK", ".", ".", ".", ".", ".", ".", ".", ".", { "region": "${AWS::Region}", "label": "Rollback%", "id": "m4" } ],
                            [ ".", "PCT_REORG", ".", ".", ".", ".", ".", ".", ".", ".", { "region": "${AWS::Region}", "label": "Reorg%", "id": "m5" } ],
                            [ ".", "PCT_RUNSTATS", ".", ".", ".", ".", ".", ".", ".", ".", { "region": "${AWS::Region}", "label": "Runstats%", "id": "m6" } ],
                            [ ".", "TOTAL_RQST_TM", ".", ".", ".", ".", ".", ".", ".", ".", { "id": "m7", "visible": false } ]
                        ],
                        "sparkline": true,
                        "view": "timeSeries",
                        "stacked": true,
                        "region": "${AWS::Region}",
                        "title": "DB Utility Processing Time",
                        "setPeriodToTimeRange": true,
                        "period": 60,
                        "stat": "Average",
                        "yAxis": {
                            "left": {
                                "label": "Percent",
                                "showUnits": false,
                                "min": 0,
                                "max": 100
                            },
                            "right": {
                                "min": 0,
                                "max": 100
                            }
                        }
                    }
                },
                {
                    "type": "metric",
                    "x": 0,
                    "y": 143,
                    "width": 13,
                    "height": 6,
                    "properties": {
                        "metrics": [
                            [ { "expression": "SELECT AVG(AVG_READ_TIME) FROM SCHEMA(\"${cloudWatchNamespace}\", Database, InstanceID,\"MEMBER\",TBSP_NAME,TableName) WHERE TableName = 'TSP_DSKIO' AND InstanceID='${db2Instance}' AND Database='${database}' GROUP BY TBSP_NAME", "label": "", "id": "q1", "region": "${AWS::Region}", "period": 60 } ]
                        ],
                        "sparkline": true,
                        "view": "timeSeries",
                        "stacked": false,
                        "region": "${AWS::Region}",
                        "title": "Direct Read Requests",
                        "stat": "Average",
                        "period": 60,
                        "yAxis": {
                            "left": {
                                "label": "Sec",
                                "showUnits": false
                            }
                        }
                    }
                },
                {
                    "type": "metric",
                    "x": 13,
                    "y": 143,
                    "width": 11,
                    "height": 6,
                    "properties": {
                        "metrics": [
                            [ { "expression": "SELECT AVG(AVG_WRITE_TIME) FROM SCHEMA(\"${cloudWatchNamespace}\", Database,  InstanceID,\"MEMBER\",TBSP_NAME,TableName) WHERE TableName = 'TSP_DSKIO' AND InstanceID='${db2Instance}' AND Database='${database}' GROUP BY TBSP_NAME", "label": "", "id": "q1", "region": "${AWS::Region}", "period": 60 } ]
                        ],
                        "sparkline": true,
                        "view": "timeSeries",
                        "stacked": false,
                        "region": "${AWS::Region}",
                        "title": "Direct Write Requests",
                        "stat": "Average",
                        "period": 300,
                        "yAxis": {
                            "left": {
                                "showUnits": false,
                                "label": "Sec"
                            }
                        }
                    }
                },
                {
                    "type": "metric",
                    "x": 0,
                    "y": 150,
                    "width": 8,
                    "height": 8,
                    "properties": {
                        "metrics": [
                            [ { "expression": "SELECT AVG(TBSP_MB_USED) FROM SCHEMA(\"${cloudWatchNamespace}\",Database,InstanceID,\"MEMBER\",TBSP_NAME,TableName) WHERE InstanceID = '${db2Instance}' AND Database = '${database}' GROUP BY TBSP_NAME", "label": "", "id": "q1", "region": "${AWS::Region}", "period": 60, "visible": false } ],
                            [ { "expression": "q1/1024", "label": "", "id": "e1", "region": "${AWS::Region}" } ]
                        ],
                        "view": "timeSeries",
                        "stacked": false,
                        "region": "${AWS::Region}",
                        "stat": "Average",
                        "period": 300,
                        "title": "TS Used",
                        "yAxis": {
                            "left": {
                                "showUnits": false,
                                "label": "GiB"
                            },
                            "right": {
                                "label": "",
                                "showUnits": true
                            }
                        }
                    }
                },
                {
                    "type": "metric",
                    "x": 0,
                    "y": 1,
                    "width": 9,
                    "height": 5,
                    "properties": {
                        "metrics": [
                            [ "${cloudWatchNamespace}", "CPU_ONL", "TableName", "DB_SYSRE", "InstanceID", "${db2Instance}", "Database", "${database}", "MEMBER", "member_0", { "region": "${AWS::Region}", "label": "CPU Online" } ],
                            [ ".", "CPU_CFG", ".", ".", ".", ".", ".", ".", ".", ".", { "region": "${AWS::Region}", "label": "CPU Configured" } ],
                            [ ".", "CPU_HMT", ".", ".", ".", ".", ".", ".", ".", ".", { "region": "${AWS::Region}", "label": "CPU Hyperthreading" } ]
                        ],
                        "sparkline": true,
                        "view": "singleValue",
                        "stacked": false,
                        "region": "${AWS::Region}",
                        "stat": "Average",
                        "period": 60,
                        "title": "CPU Metrics",
                        "singleValueFullPrecision": true
                    }
                },
                {
                    "type": "metric",
                    "x": 13,
                    "y": 1,
                    "width": 11,
                    "height": 5,
                    "properties": {
                        "metrics": [
                            [ "${cloudWatchNamespace}", "CPU_LOAD_SHRT", "TableName", "DB_SYSRE", "InstanceID", "${db2Instance}", "Database", "${database}", "MEMBER", "member_0", { "label": "CPU Load over 1 Min", "region": "${AWS::Region}" } ],
                            [ ".", "CPU_LOAD_MED", ".", ".", ".", ".", ".", ".", ".", ".", { "label": "CPU Load over 10 min", "region": "${AWS::Region}" } ],
                            [ ".", "CPU_LOAD_LNG", ".", ".", ".", ".", ".", ".", ".", ".", { "label": "CPU Load over 15 min", "region": "${AWS::Region}" } ]
                        ],
                        "sparkline": true,
                        "view": "timeSeries",
                        "stacked": false,
                        "region": "${AWS::Region}",
                        "stat": "Average",
                        "period": 60,
                        "title": "Runnable Processes",
                        "yAxis": {
                            "left": {
                                "label": "Percent",
                                "showUnits": false
                            }
                        }
                    }
                },
                {
                    "type": "text",
                    "x": 0,
                    "y": 0,
                    "width": 24,
                    "height": 1,
                    "properties": {
                        "markdown": "# System Key Metrics",
                        "background": "transparent"
                    }
                },
                {
                    "type": "metric",
                    "x": 9,
                    "y": 1,
                    "width": 4,
                    "height": 5,
                    "properties": {
                        "metrics": [
                            [ { "expression": "m1/1000", "label": "CPU Speed", "id": "e1", "region": "${AWS::Region}" } ],
                            [ "${cloudWatchNamespace}", "CPU_SPEED", "TableName", "DB_SYSRE", "InstanceID", "${db2Instance}", "Database", "${database}", "MEMBER", "member_0", { "id": "m1", "region": "${AWS::Region}", "visible": false } ]
                        ],
                        "sparkline": true,
                        "view": "timeSeries",
                        "stacked": false,
                        "region": "${AWS::Region}",
                        "stat": "Average",
                        "period": 900,
                        "title": "CPU Speed",
                        "yAxis": {
                            "left": {
                                "showUnits": false,
                                "label": "GHz"
                            }
                        }
                    }
                },
                {
                    "type": "metric",
                    "x": 0,
                    "y": 13,
                    "width": 7,
                    "height": 5,
                    "properties": {
                        "metrics": [
                            [ { "expression": "FLOOR((m12*1024*1024/1000/1000/1000/1000)*10000)/10000", "label": "DB Size in TB", "id": "e1", "region": "${AWS::Region}" } ],
                            [ { "expression": "FLOOR((m4*60/1000/1000)*1000)/1000", "label": "Million Commits", "id": "e5", "region": "${AWS::Region}" } ],
                            [ { "expression": "m7*60", "label": "Total Rollbacks", "id": "e3", "region": "${AWS::Region}" } ],
                            [ { "expression": "CEIL(m3*60)", "label": "Total Activities", "id": "e4", "region": "${AWS::Region}", "visible": false } ],
                            [ { "expression": "CEIL((m1)*60/1000/1000)", "label": "Million Selects", "id": "e2", "region": "${AWS::Region}", "visible": false } ],
                            [ { "expression": "CEIL((m2)*60/1000/1000)", "label": "Million IUD", "id": "e13", "region": "${AWS::Region}", "visible": false } ],
                            [ { "expression": "CEIL(m5*60)", "label": "Total Deadlocks", "id": "e6", "region": "${AWS::Region}", "visible": false } ],
                            [ { "expression": "CEIL(m6*60)", "label": "Pkg Cache Inserts", "id": "e7", "region": "${AWS::Region}", "visible": false } ],
                            [ { "expression": "CEIL(m8*60/1000/1000)", "label": "Physical Million Reads", "id": "e8", "region": "${AWS::Region}", "visible": false } ],
                            [ { "expression": "CEIL(m9*60/1000/1000)", "label": "Millions Rows Inserted", "id": "e9", "region": "${AWS::Region}", "visible": false } ],
                            [ { "expression": "CEIL(m11*60/1000/1000)", "label": "Million Rows Modified", "id": "e11", "region": "${AWS::Region}", "visible": false } ],
                            [ { "expression": "CEIL(m10*60/1000/1000)", "label": "Million Rows Returned", "id": "e10", "region": "${AWS::Region}", "visible": false } ],
                            [ { "expression": "CEIL(m13*60/1000/1000)", "label": "Million Rows Updated", "id": "e12", "region": "${AWS::Region}", "visible": false } ],
                            [ "${cloudWatchNamespace}", "SEL_P_S", "TableName", "DB_THRUP", "InstanceID", "${db2Instance}", "Database", "${database}", "MEMBER", "member_0", { "label": "SEL_P_S", "region": "${AWS::Region}", "id": "m1", "visible": false } ],
                            [ ".", "UID_P_S", ".", ".", ".", ".", ".", ".", ".", ".", { "label": "UID_P_S", "region": "${AWS::Region}", "id": "m2", "visible": false } ],
                            [ ".", "ACT_PER_S", ".", ".", ".", ".", ".", ".", ".", ".", { "label": "ACT_PER_S", "region": "${AWS::Region}", "id": "m3", "visible": false } ],
                            [ ".", "CMT_PER_S", ".", ".", ".", ".", ".", ".", ".", ".", { "label": "CMT_PER_S", "region": "${AWS::Region}", "id": "m4", "visible": false } ],
                            [ ".", "RB_PER_S", ".", ".", ".", ".", ".", ".", ".", ".", { "id": "m7", "visible": false, "region": "${AWS::Region}" } ],
                            [ ".", "DDLCK_PER_S", ".", ".", ".", ".", ".", ".", ".", ".", { "label": "DDLCK_PER_S", "region": "${AWS::Region}", "id": "m5", "visible": false } ],
                            [ ".", "PKG_CACHE_INS_P_S", ".", ".", ".", ".", ".", ".", ".", ".", { "label": "PKG_CACHE_INS_P_S", "region": "${AWS::Region}", "id": "m6", "visible": false } ],
                            [ ".", "P_RD_PER_S", ".", ".", ".", ".", ".", ".", ".", ".", { "label": "P_RD_PER_S", "region": "${AWS::Region}", "id": "m8", "visible": false } ],
                            [ ".", "ROWS_INS_P_S", ".", ".", ".", ".", ".", ".", ".", ".", { "label": "ROWS_INS_P_S", "region": "${AWS::Region}", "id": "m9", "visible": false } ],
                            [ ".", "ROWS_RET_P_S", ".", ".", ".", ".", ".", ".", ".", ".", { "label": "ROWS_RET_P_S", "region": "${AWS::Region}", "id": "m10", "visible": false } ],
                            [ ".", "ROWS_MOD_P_S", ".", ".", ".", ".", ".", ".", ".", ".", { "label": "ROWS_MOD_P_S", "region": "${AWS::Region}", "id": "m11", "visible": false } ],
                            [ ".", "ROWS_UPD_P_S", ".", ".", ".", ".", ".", ".", ".", ".", { "id": "m13", "visible": false, "region": "${AWS::Region}" } ],
                            [ ".", "DB_MB_USED", ".", "DB_SIZE", ".", ".", ".", ".", ".", ".", { "region": "${AWS::Region}", "label": "Database Size MB Used", "stat": "Average", "id": "m12", "visible": false } ]
                        ],
                        "view": "singleValue",
                        "stacked": false,
                        "region": "${AWS::Region}",
                        "title": "Database Activities Over Range",
                        "period": 86400,
                        "stat": "Sum",
                        "setPeriodToTimeRange": true,
                        "singleValueFullPrecision": true,
                        "sparkline": false
                    }
                },
                {
                    "type": "metric",
                    "x": 0,
                    "y": 134,
                    "width": 12,
                    "height": 5,
                    "properties": {
                        "metrics": [
                            [ { "expression": "SELECT AVG(INDEX_HR) FROM SCHEMA(\"${cloudWatchNamespace}\", InstanceID,Database, \"MEMBER\",TBSP_NAME,TableName) WHERE TableName = 'BPL_STATS' AND Database = '${database}' AND InstanceID = '${db2Instance}' GROUP BY TBSP_NAME", "label": "", "id": "q1", "region": "${AWS::Region}", "period": 300 } ]
                        ],
                        "view": "timeSeries",
                        "stacked": false,
                        "region": "${AWS::Region}",
                        "stat": "Average",
                        "period": 300,
                        "title": "Index BP Hit Ratio"
                    }
                },
                {
                    "type": "metric",
                    "x": 12,
                    "y": 134,
                    "width": 12,
                    "height": 5,
                    "properties": {
                        "metrics": [
                            [ { "expression": "SELECT AVG(DATA_HR) FROM SCHEMA(\"${cloudWatchNamespace}\", InstanceID,Database, \"MEMBER\",TBSP_NAME,TableName) WHERE TableName = 'BPL_STATS' AND Database = '${database}' AND InstanceID = '${db2Instance}' GROUP BY TBSP_NAME", "label": "", "id": "q1", "region": "${AWS::Region}", "period": 300 } ]
                        ],
                        "view": "timeSeries",
                        "stacked": false,
                        "region": "${AWS::Region}",
                        "stat": "Average",
                        "period": 300,
                        "title": "Data BP Hit Ratio"
                    }
                },
                {
                    "type": "text",
                    "x": 0,
                    "y": 127,
                    "width": 24,
                    "height": 1,
                    "properties": {
                        "markdown": "# Log Write Time",
                        "background": "transparent"
                    }
                },
                {
                    "type": "metric",
                    "x": 0,
                    "y": 128,
                    "width": 12,
                    "height": 5,
                    "properties": {
                        "metrics": [
                            [ "${cloudWatchNamespace}", "LOG_WRITE_TIME_PER_IO_MS", "TableName", "DB_LOGWR", "InstanceID", "${db2Instance}", "Database", "${database}", "MEMBER", "member_0", { "region": "${AWS::Region}", "yAxis": "left", "label": "Log Write Time IO in ms" } ],
                            [ ".", "LOG_WRITE_IO_PER_S", ".", ".", ".", ".", ".", ".", ".", ".", { "region": "${AWS::Region}", "yAxis": "left", "label": "Log Write IO per Seconds", "visible": false } ],
                            [ ".", "TOTAL_CLIENTS", ".", "DB_CLACT", ".", ".", ".", ".", ".", ".", { "yAxis": "left", "label": "Total Clients", "stat": "Sum", "visible": false, "region": "${AWS::Region}" } ]
                        ],
                        "view": "timeSeries",
                        "stacked": false,
                        "region": "${AWS::Region}",
                        "stat": "Average",
                        "period": 60,
                        "title": "Log Write Times in Milli Second",
                        "yAxis": {
                            "left": {
                                "label": "Milli-Seconds",
                                "showUnits": false
                            },
                            "right": {
                                "showUnits": false
                            }
                        },
                        "annotations": {
                            "horizontal": [
                                {
                                    "label": "High",
                                    "value": 2,
                                    "fill": "above"
                                }
                            ]
                        },
                        "legend": {
                            "position": "bottom"
                        }
                    }
                },
                {
                    "type": "metric",
                    "x": 0,
                    "y": 139,
                    "width": 12,
                    "height": 3,
                    "properties": {
                        "metrics": [
                            [ { "expression": "SELECT MAX(SIZE_MB) FROM SCHEMA(\"${cloudWatchNamespace}\", BP_NAME,InstanceID,Database, \"MEMBER\",TableName) WHERE TableName = 'BPL_SIZES' AND Database = '${database}' AND InstanceID = '${db2Instance}' GROUP BY BP_NAME", "label": "", "id": "q1", "region": "${AWS::Region}", "period": 900 } ]
                        ],
                        "view": "singleValue",
                        "stacked": false,
                        "region": "${AWS::Region}",
                        "stat": "Average",
                        "period": 900,
                        "title": "Bufferpool Sizes in MB",
                        "yAxis": {
                            "left": {
                                "label": "MB",
                                "showUnits": false
                            },
                            "right": {
                                "showUnits": false
                            }
                        },
                        "singleValueFullPrecision": true
                    }
                },
                {
                    "type": "metric",
                    "x": 12,
                    "y": 139,
                    "width": 11,
                    "height": 3,
                    "properties": {
                        "metrics": [
                            [ { "expression": "SELECT MAX(NUM_PAGES) FROM SCHEMA(\"${cloudWatchNamespace}\", BP_NAME,InstanceID,Database, \"MEMBER\",TableName) WHERE TableName = 'BPL_SIZES' AND Database = '${database}' AND InstanceID = '${db2Instance}' GROUP BY BP_NAME", "label": "", "id": "q1", "region": "${AWS::Region}", "period": 900 } ]
                        ],
                        "view": "singleValue",
                        "stacked": false,
                        "region": "${AWS::Region}",
                        "stat": "Average",
                        "period": 900,
                        "title": "Bufferpol Sizes in Pages",
                        "yAxis": {
                            "left": {
                                "label": "Pages",
                                "showUnits": false
                            },
                            "right": {
                                "showUnits": false
                            }
                        },
                        "singleValueFullPrecision": true
                    }
                },
                {
                    "type": "metric",
                    "x": 0,
                    "y": 32,
                    "width": 12,
                    "height": 6,
                    "properties": {
                        "metrics": [
                            [ "${cloudWatchNamespace}", "ACTIVE_CLIENTS", "TableName", "DB_CLACT", "InstanceID", "${db2Instance}", "Database", "${database}", "MEMBER", "member_0", { "id": "m4", "yAxis": "left", "region": "${AWS::Region}", "label": "Number of Active Clients", "color": "#1f77b4", "stat": "p99" } ],
                            [ ".", "TOTAL_CLIENTS", ".", ".", ".", ".", ".", ".", ".", ".", { "id": "m5", "region": "${AWS::Region}", "label": "Total Clients" } ]
                        ],
                        "view": "timeSeries",
                        "stacked": false,
                        "region": "${AWS::Region}",
                        "title": "Total and Active Connections",
                        "period": 60,
                        "stat": "Average",
                        "setPeriodToTimeRange": true,
                        "yAxis": {
                            "left": {
                                "min": 0,
                                "label": "",
                                "showUnits": false
                            },
                            "right": {
                                "label": "Percent",
                                "min": 0,
                                "showUnits": false
                            }
                        },
                        "legend": {
                            "position": "bottom"
                        }
                    }
                },
                {
                    "type": "metric",
                    "x": 0,
                    "y": 100,
                    "width": 24,
                    "height": 6,
                    "properties": {
                        "metrics": [
                            [ { "expression": "(e4-e3)*100/e4", "label": "Sectional Sort Wait%", "id": "e1", "region": "${AWS::Region}", "visible": false, "stat": "Average", "period": 60 } ],
                            [ { "expression": "e3*100/e4", "label": "Section Sort Processing%", "id": "e2", "yAxis": "right", "region": "${AWS::Region}", "visible": false, "stat": "Average", "period": 60 } ],
                            [ { "expression": "IF(m9>m6, 0, m9)", "label": "Expression3", "id": "e3", "yAxis": "right", "region": "${AWS::Region}", "visible": false, "stat": "Average", "period": 60 } ],
                            [ { "expression": "m6", "label": "Expression4", "id": "e4", "yAxis": "right", "region": "${AWS::Region}", "visible": false, "stat": "Average", "period": 60 } ],
                            [ "${cloudWatchNamespace}", "TOTAL_SORTS", "TableName", "DB_SORT", "InstanceID", "${db2Instance}", "Database", "${database}", "MEMBER", "member_0", { "label": "Total Sorts", "region": "${AWS::Region}", "id": "m1" } ],
                            [ ".", "SORT_OVERFLOWS", ".", ".", ".", ".", ".", ".", ".", ".", { "label": "Sort Overflows", "region": "${AWS::Region}", "id": "m2" } ],
                            [ ".", "HSJN_OVFL", ".", ".", ".", ".", ".", ".", ".", ".", { "label": "Hash Join Overflows", "region": "${AWS::Region}", "id": "m3" } ],
                            [ ".", "PST_THR_HSJN", ".", ".", ".", ".", ".", ".", ".", ".", { "label": "Post Threshold Hash Join", "region": "${AWS::Region}", "id": "m4" } ],
                            [ ".", "PST_SHRTHR_HSJN", ".", ".", ".", ".", ".", ".", ".", ".", { "label": "Post Shared Threshold Hash Joins", "region": "${AWS::Region}", "id": "m5" } ],
